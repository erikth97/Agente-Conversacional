name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check app/ scripts/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t banorte-agent:ci .

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t banorte-agent:ci .
      - name: Start container
        run: |
          docker run -d --name banorte-ci \
            -e OPENAI_API_KEY=dummy \
            -p 8000:8000 \
            banorte-agent:ci
      - name: Wait for startup
        run: sleep 15
      - name: Health check
        run: curl -f http://localhost:8000/health
      - name: Stop container
        if: always()
        run: docker stop banorte-ci && docker rm banorte-ci
